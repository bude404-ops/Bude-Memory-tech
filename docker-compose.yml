version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bude-memory-db
    environment:
      POSTGRES_USER: bude
      POSTGRES_PASSWORD: budepass
      POSTGRES_DB: budememory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bude -d budememory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: bude-memory-api
    environment:
      DATABASE_URL: postgresql://bude:budepass@postgres:5432/budememory
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
